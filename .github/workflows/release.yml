name: Generar APK de Maicol Adventure

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas una etiqueta de versión (ej. v1.3)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar tu código de GitHub
      uses: actions/checkout@v4

    - name: 2. Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Configurar Java (Obligatorio para Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 4. Instalar dependencias del proyecto
      run: npm install

    - name: 5. Agregar y Sincronizar Plataforma Android
      run: |
        npx cap add android || true
        npx cap sync android

    - name: 6. Dar permisos al compilador de Android
      run: chmod +x ./android/gradlew || true

    - name: 7. Compilar y fabricar la APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: 8. Publicar la APK en la pestaña Releases de GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/debug/Maicol-adventure-app.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
