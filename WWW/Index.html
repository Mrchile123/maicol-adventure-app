<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maicol adventure: the app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-container">
        <header>
            <img src="../Temporadas.png" alt="Banner App" class="app-banner">
            <h1>Maicol adventure: the app</h1>
        </header>

        <section class="row">
            <h2>Temporadas</h2>
            <div class="grid" id="temporadas-grid">
                <button class="card" data-temp="1" id="btn-temp1">
                    <img src="../Temporada 1.png" alt="Temporada 1">
                    <span>Temporada 1</span>
                </button>
                <button class="card" data-temp="2" id="btn-temp2">
                    <img src="../Temporada 2.png" alt="Temporada 2">
                    <span>Temporada 2</span>
                </button>
            </div>
        </section>

        <section class="row">
            <h2 id="episodios-titulo">Episodios</h2>
            <div class="grid" id="episodios-grid">
                </div>
        </section>
    </div>

    <div id="video-player-container" class="hidden">
        <button class="close-video-btn" id="btn-close-video">✕</button>
        <video id="video-player" controls></video>
    </div>

    <script src="script.js"></script>
</body>
</html>
